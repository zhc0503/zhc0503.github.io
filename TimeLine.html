<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <title>Boss 的时间线</title>
</head>
<body class="bg-gray-50 py-10">
    <div class="max-w-2xl mx-auto px-4">
        <h2 class="text-3xl font-bold text-center mb-12 text-gray-800">📅 Boss 的项目里程碑</h2>
        
        <div class="relative border-l-4 border-blue-500 ml-3">
            <div class="mb-10 ml-6">
                <span class="absolute -left-[11px] flex items-center justify-center w-5 h-5 bg-blue-500 rounded-full ring-8 ring-white"></span>
                <div class="p-4 bg-white rounded-lg shadow-sm border border-gray-100">
                    <time class="block mb-1 text-sm font-mono text-gray-400">2026-01-24</time>
                    <h3 class="text-lg font-semibold text-blue-600">🎨 启动“三色时间管理”系统</h3>
                    <p class="text-gray-600 mt-2">正式确立 Red (Sleep), Green (Growth), Blue (Career) 的生活平衡框架。</p>
                </div>
            </div>

            <div class="mb-10 ml-6">
                <span class="absolute -left-[11px] flex items-center justify-center w-5 h-5 bg-green-500 rounded-full ring-8 ring-white"></span>
                <div class="p-4 bg-white rounded-lg shadow-sm border border-gray-100">
                    <time class="block mb-1 text-sm font-mono text-gray-400">2026-02-15</time>
                    <h3 class="text-lg font-semibold text-green-600">📈 ETH 网格交易实盘启动</h3>
                    <p class="text-gray-600 mt-2">投入 $10,000 开启以太坊自动化交易策略，优化波动区间参数。</p>
                </div>
            </div>

            <div class="mb-10 ml-6">
                <span class="absolute -left-[11px] flex items-center justify-center w-5 h-5 bg-purple-500 rounded-full ring-8 ring-white"></span>
                <div class="p-4 bg-white rounded-lg shadow-sm border border-gray-100">
                    <time class="block mb-1 text-sm font-mono text-gray-400">2026-03-03</time>
                    <h3 class="text-lg font-semibold text-purple-600">🧠 知识库迁移计划</h3>
                    <p class="text-gray-600 mt-2">从 OneNote 迁移至 Heptabase/Logseq 体系，构建跨设备同步流。</p>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
